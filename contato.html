<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Entre em contato com o desenvolvedor através do formulário de mensagem.">
    <meta name="keywords" content="Desenvolvedor, Software Engineer, Front-End, HTML, CSS, JavaScript">
    <title>Meu Portfólio | Contato</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js" defer></script>
    <script src="js/script.js" defer></script>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">Portfólio</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="projetos.html">Projetos</a></li>
                <li><a href="contato.html" class="active">Contato</a></li>
            </ul>
            <div class="menu-toggle">⚡</div>
        </nav>
    </header>

    <main class="container">
        <div class="form-container">
            <h2>Entre em contato</h2>
            <form id="contactForm" novalidate style="margin-top: 20px;">
                <div class="form-group">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome">
                    <span id="error-nome" class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email">
                    <span id="error-email" class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="5"></textarea>
                    <span id="error-mensagem" class="error-msg"></span>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Enviar Mensagem</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 - Desenvolvido com foco e dedicação.</p>
    </footer>
</body>
</html>
